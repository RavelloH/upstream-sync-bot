name: Sync one downstream
description: |
  Performs a single upstream-to-downstream sync against one target repository.
  Designed to be called from a matrix strategy in the bot's fan-out workflow.
  All heavy logic (mode detection, base resolution, conflict handling, PR body
  generation) is ported from the legacy in-repo `sync-upstream.yml` so the
  user-facing PR output is identical.

inputs:
  target-owner:
    description: Owner login of the downstream repo to sync into.
    required: true
  target-repo:
    description: Name of the downstream repo to sync into.
    required: true
  target-default-branch:
    description: Default branch of the downstream repo (the PR base).
    required: true
  target-token:
    description: GitHub App installation token scoped to just this target repo.
    required: true
  upstream-read-token:
    description: |
      Token used to look up upstream commit metadata (author logins) for the
      PR body's "Incoming commits" section. Typically the workflow's
      secrets.GITHUB_TOKEN — it can read public-repo metadata without
      further setup. If the upstream is private, supply an installation
      token that has access to it instead.
    required: false
    default: ""
  config-path:
    description: Path (relative to the bot repo root) to sync-bot.config.json.
    required: false
    default: sync-bot.config.json

runs:
  using: composite
  steps:
    - name: Load config
      shell: bash
      env:
        CONFIG_PATH_INPUT: ${{ inputs.config-path }}
      run: |
        CONFIG="$GITHUB_WORKSPACE/$CONFIG_PATH_INPUT"
        if [ ! -f "$CONFIG" ]; then
          echo "::error::Config file not found at $CONFIG"
          exit 1
        fi

        UPSTREAM_OWNER=$(jq -r '.upstream.owner' "$CONFIG")
        UPSTREAM_REPO_NAME=$(jq -r '.upstream.repo' "$CONFIG")
        UPSTREAM_BRANCH=$(jq -r '.upstream.branch' "$CONFIG")
        SYNC_TARGET_TYPE=$(jq -r '.upstream.syncTarget.type // "branch"' "$CONFIG")
        SYNC_TARGET_MAJOR=$(jq -r '.upstream.syncTarget.major // ""' "$CONFIG")
        SYNC_BRANCH=$(jq -r '.downstream.syncBranch' "$CONFIG")
        PR_TITLE=$(jq -r '.downstream.prTitle' "$CONFIG")
        TREE_SCAN_EXCLUDE=$(jq -r '.downstream.treeScanExclude | map(":!" + .) | join(" ")' "$CONFIG")

        # Materialize the review checklist (optional array of markdown
        # strings) to a sidecar file consumed by the PR body builder.
        # Missing or null -> empty file -> the section is omitted.
        jq -r '.downstream.reviewChecklist // [] | .[] | "- [ ] " + .' "$CONFIG" \
          > /tmp/review-checklist.md

        {
          echo "UPSTREAM_OWNER=$UPSTREAM_OWNER"
          echo "UPSTREAM_REPO_NAME=$UPSTREAM_REPO_NAME"
          echo "UPSTREAM_REPO=$UPSTREAM_OWNER/$UPSTREAM_REPO_NAME"
          echo "UPSTREAM_BRANCH=$UPSTREAM_BRANCH"
          echo "SYNC_TARGET_TYPE=$SYNC_TARGET_TYPE"
          echo "SYNC_TARGET_MAJOR=$SYNC_TARGET_MAJOR"
          echo "SYNC_BRANCH=$SYNC_BRANCH"
          echo "PR_TITLE=$PR_TITLE"
          echo "TREE_SCAN_EXCLUDE=$TREE_SCAN_EXCLUDE"
        } >> "$GITHUB_ENV"

        echo "Loaded config for $UPSTREAM_OWNER/$UPSTREAM_REPO_NAME (branch $UPSTREAM_BRANCH)."

    - name: Clone target repo
      shell: bash
      env:
        TARGET_OWNER: ${{ inputs.target-owner }}
        TARGET_REPO: ${{ inputs.target-repo }}
        TARGET_TOKEN: ${{ inputs.target-token }}
      run: |
        # x-access-token is the GitHub-recommended username for installation
        # token https auth. Token is auto-redacted in logs by Actions because
        # it was passed via `secrets.*` -> step output -> input.
        git clone \
          --no-tags \
          "https://x-access-token:${TARGET_TOKEN}@github.com/${TARGET_OWNER}/${TARGET_REPO}.git" \
          target
        echo "Cloned ${TARGET_OWNER}/${TARGET_REPO} into ./target"

    - name: Configure git identity
      shell: bash
      working-directory: target
      run: |
        # Commits are authored as the GitHub App's bot user. The numeric ID
        # ensures GitHub renders the avatar correctly. We use the
        # generic "actions" email shape — replaced if the App provides a
        # better identity via the token claims (not exposed in v1).
        git config user.name 'sync-upstream-bot[bot]'
        git config user.email 'sync-upstream-bot@users.noreply.github.com'

    - name: Add upstream remote and fetch
      shell: bash
      working-directory: target
      run: |
        git remote add upstream "https://github.com/${UPSTREAM_REPO}.git"
        git fetch upstream "${UPSTREAM_BRANCH}" --no-recurse-submodules
        if [ "${SYNC_TARGET_TYPE}" = "latestTag" ] || [ "${SYNC_TARGET_TYPE}" = "latestMajorTag" ]; then
          git fetch upstream "refs/tags/*:refs/tags/*" --no-recurse-submodules
        fi

    - name: Resolve upstream sync target
      shell: bash
      working-directory: target
      run: |
        eval "$(node "${GITHUB_WORKSPACE}/scripts/select-sync-target.mjs" \
          "${SYNC_TARGET_TYPE}" \
          "${SYNC_TARGET_MAJOR}" \
          "upstream/${UPSTREAM_BRANCH}")"

        {
          echo "SYNC_TARGET_SHA=${TARGET_SHA}"
          echo "SYNC_TARGET_SHORT=${TARGET_SHA:0:7}"
          echo "SYNC_TARGET_REF=${TARGET_REF}"
          echo "SYNC_TARGET_KIND=${TARGET_KIND}"
          echo "SYNC_TARGET_TAG=${TARGET_TAG}"
        } >> "$GITHUB_ENV"

        if [ -n "${TARGET_TAG}" ]; then
          echo "Resolved upstream sync target: ${TARGET_TAG} (${TARGET_SHA:0:7})."
        else
          echo "Resolved upstream sync target: ${TARGET_REF} (${TARGET_SHA:0:7})."
        fi

    - name: Detect sync mode and base
      id: base
      shell: bash
      working-directory: target
      env:
        DEFAULT_BRANCH: ${{ inputs.target-default-branch }}
      run: |
        # Three repository shapes are supported:
        #   * Fork — created via GitHub's Fork button. Full git history,
        #     shares a merge-base with upstream.
        #   * Clean clone — `git clone` + `git remote set-url`. Same as
        #     fork structurally: full history, shares a merge-base.
        #   * Snapshot clone — created via Cloudflare's "Deploy to
        #     Cloudflare" button. A single `source repo import` commit
        #     by cloudflare[bot], no shared history with upstream.
        #
        # Mode is chosen by whether `git merge-base` finds shared history:
        #   * yes -> mode=merge: regular `git merge --no-ff`, preserves
        #            upstream commit history in the user's repo.
        #   * no  -> mode=adopt-history: rebuild the sync branch on top of
        #            upstream history, then re-apply downstream customizations
        #            as a single commit. After that PR is merged, future runs
        #            naturally use merge mode.

        MERGE_BASE="$(git merge-base "origin/${DEFAULT_BRANCH}" "${SYNC_TARGET_SHA}" 2>/dev/null || true)"

        if [ -n "${MERGE_BASE}" ]; then
          MODE=merge
          BASE_SHA="${MERGE_BASE}"
          echo "Shared git history detected (merge-base ${BASE_SHA:0:7}). Using MERGE mode."
        else
          MODE=adopt-history
          echo "Snapshot clone detected. Scanning upstream for the best matching tree..."
          BASE_SHA=""
          # In adopt-history mode, workflow files are never bot-managed and
          # sync-bot.config.json is normally instance-local. Ignore both while
          # searching for the upstream commit represented by the downstream
          # tree.
          for sha in $(git rev-list "${SYNC_TARGET_SHA}" --max-count=1000); do
            # shellcheck disable=SC2086
            if git diff --quiet HEAD "$sha" -- . ${TREE_SCAN_EXCLUDE} ':!.github/workflows/**' ':!sync-bot.config.json'; then
              BASE_SHA="$sha"
              break
            fi
          done

          if [ -n "${BASE_SHA}" ]; then
            echo "Tree-match found upstream commit ${BASE_SHA:0:7}. Using ADOPT-HISTORY mode."
          else
            echo "::error::Could not auto-resolve the upstream base commit. The local HEAD tree did not match any of the last 1000 upstream commits."
            exit 1
          fi
        fi

        {
          echo "mode=${MODE}"
          echo "base_sha=${BASE_SHA}"
          echo "base_short=${BASE_SHA:0:7}"
          echo "default_branch=${DEFAULT_BRANCH}"
        } >> "$GITHUB_OUTPUT"

    - name: Compute sync range
      id: range
      shell: bash
      working-directory: target
      run: |
        DEFAULT_BRANCH='${{ steps.base.outputs.default_branch }}'
        BASE_SHA='${{ steps.base.outputs.base_sha }}'
        MODE='${{ steps.base.outputs.mode }}'
        HEAD_SHA="${SYNC_TARGET_SHA}"

        echo "default_branch=${DEFAULT_BRANCH}" >> "$GITHUB_OUTPUT"

        if [ "$BASE_SHA" = "$HEAD_SHA" ] && [ "$MODE" != "adopt-history" ]; then
          echo "Upstream is already at the synced base (${BASE_SHA:0:7}). Nothing to do."
          echo "has_changes=false" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        if [ "$MODE" = "merge" ] && git merge-base --is-ancestor "$HEAD_SHA" "origin/${DEFAULT_BRANCH}"; then
          echo "Upstream sync target is already an ancestor of origin/${DEFAULT_BRANCH}. Nothing to do."
          echo "has_changes=false" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        COMMIT_COUNT="$(git rev-list --count --no-merges "${BASE_SHA}..${HEAD_SHA}")"
        {
          echo "head_sha=${HEAD_SHA}"
          echo "head_short=${HEAD_SHA:0:7}"
          echo "commit_count=${COMMIT_COUNT}"
          echo "has_changes=true"
        } >> "$GITHUB_OUTPUT"

    - name: Prepare sync branch
      id: prepare
      if: steps.range.outputs.has_changes == 'true'
      shell: bash
      working-directory: target
      env:
        RUN_ID: ${{ github.run_id }}
      run: |
        DEFAULT_BRANCH='${{ steps.range.outputs.default_branch }}'
        MODE='${{ steps.base.outputs.mode }}'
        BASE_SHA='${{ steps.base.outputs.base_sha }}'
        HEAD_SHA='${{ steps.range.outputs.head_sha }}'
        HEAD_SHORT='${{ steps.range.outputs.head_short }}'
        COUNT='${{ steps.range.outputs.commit_count }}'

        git checkout -B "${SYNC_BRANCH}" "origin/${DEFAULT_BRANCH}"

        HAS_CONFLICTS=false
        CONFLICT_FILES=""
        MANUAL_WORKFLOW_FILES="$(git diff --name-only "${BASE_SHA}" "${HEAD_SHA}" -- '.github/workflows/**' || true)"
        if [ -n "${MANUAL_WORKFLOW_FILES}" ]; then
          echo "Workflow file changes detected. They will be excluded from the bot commit because this App does not request workflows permission."
          printf '%s\n' "${MANUAL_WORKFLOW_FILES}" > /tmp/manual-workflow-files.txt
        else
          : > /tmp/manual-workflow-files.txt
        fi

        if [ "${MODE}" = "merge" ]; then
          # Fork / clean clone — preserve upstream commit history via
          # a real merge commit. Two parents: origin/<default> and the
          # resolved upstream sync target.
          MERGE_TITLE="chore: sync upstream ${UPSTREAM_REPO}@${HEAD_SHORT}"
          MERGE_BODY="$(printf 'Merges %s upstream commit(s) from %s..%s into %s.\n\nAuto-merged by sync-upstream bot (run #%s).' \
            "${COUNT}" "${BASE_SHA:0:7}" "${HEAD_SHORT}" "${DEFAULT_BRANCH}" "${RUN_ID}")"

          if ! git merge --no-ff "${HEAD_SHA}" -m "${MERGE_TITLE}" -m "${MERGE_BODY}"; then
            CONFLICT_FILES="$(git diff --name-only --diff-filter=U)"
            HAS_CONFLICTS=true
            git add -A
            git commit -m "${MERGE_TITLE} (with conflicts)" -m "${MERGE_BODY}

        ⚠️ Conflicts in: $(echo "${CONFLICT_FILES}" | tr '\n' ' ')

        Resolve the <<<<<<< markers manually before merging this PR."
          fi

          if [ -n "${MANUAL_WORKFLOW_FILES}" ]; then
            while IFS= read -r f; do
              [ -z "$f" ] && continue
              git checkout "origin/${DEFAULT_BRANCH}" -- "$f" 2>/dev/null || git rm -f --ignore-unmatch "$f"
            done < /tmp/manual-workflow-files.txt
            git add -A -- .github/workflows
            git commit --amend --no-edit --allow-empty
          fi
        else
          # Snapshot clone — no shared history. Create a merge commit whose
          # first parent is the downstream default branch and second parent is
          # the upstream target. GitHub can open this PR because it shares
          # history with the base branch; after merge, the repo also contains
          # upstream history and future syncs use MERGE mode.
          git merge -s ours --allow-unrelated-histories --no-commit "${HEAD_SHA}"

          # Start the merge result from the upstream target tree, then overlay
          # only downstream paths that differ from the resolved upstream base.
          # This keeps real downstream customizations without preserving stale
          # template files that should be updated from upstream.
          git read-tree --reset -u "${HEAD_SHA}"

          # This App intentionally does not request `workflows` permission.
          # Remove upstream workflow files from the sync branch rather than
          # preserving downstream ones. Keeping them would require workflow
          # write permission on push.
          git rm -r -f --ignore-unmatch .github/workflows

          git diff --name-status -z "${BASE_SHA}" "origin/${DEFAULT_BRANCH}" -- . ':(exclude).github/workflows/**' \
            > /tmp/downstream-customizations.z
          node -e '
            const fs = require("fs");
            const data = fs.readFileSync("/tmp/downstream-customizations.z", "utf8").split("\0").filter(Boolean);
            const paths = [];
            for (let i = 0; i < data.length; i += 1) {
              const status = data[i];
              if (/^[RC]/.test(status)) {
                paths.push(data[i + 1], data[i + 2]);
                i += 2;
              } else {
                paths.push(data[i + 1]);
                i += 1;
              }
            }
            for (const p of [...new Set(paths)].filter(Boolean)) console.log(p);
          ' > /tmp/downstream-customization-paths.txt

          while IFS= read -r f; do
            [ -z "$f" ] && continue
            git checkout "origin/${DEFAULT_BRANCH}" -- "$f" 2>/dev/null || git rm -f --ignore-unmatch "$f"
          done < /tmp/downstream-customization-paths.txt
          git rm -r -f --ignore-unmatch .github/workflows

          git add -A

          ADOPT_TITLE="chore: adopt upstream history at ${UPSTREAM_REPO}@${HEAD_SHORT}"
          ADOPT_BODY="Rebuilds this snapshot-clone sync branch on top of upstream history at ${HEAD_SHORT}.

        Preserves downstream customizations from origin/${DEFAULT_BRANCH} relative to upstream base ${BASE_SHA:0:7}.

        Auto-applied by sync-upstream bot (run #${RUN_ID})."

          if [ "${HAS_CONFLICTS}" = "true" ]; then
            git commit --allow-empty -m "${ADOPT_TITLE} (with conflicts)" -m "${ADOPT_BODY}

        ⚠️ Manual resolution required in: $(echo "${CONFLICT_FILES}" | tr '\n' ' ')

        Resolve conflict markers before merging this PR."
          else
            if git diff --cached --quiet; then
              git commit --allow-empty -m "${ADOPT_TITLE}" -m "${ADOPT_BODY}

        No downstream customizations needed to be reapplied."
            else
              git commit -m "${ADOPT_TITLE}" -m "${ADOPT_BODY}"
            fi
          fi
        fi

        # Persist conflict list for the PR body step.
        printf '%s\n' "${CONFLICT_FILES}" > /tmp/conflict-files.txt

        echo "has_conflicts=${HAS_CONFLICTS}" >> "$GITHUB_OUTPUT"
        echo "skip=false" >> "$GITHUB_OUTPUT"

    - name: Force-push sync branch
      if: steps.range.outputs.has_changes == 'true' && steps.prepare.outputs.skip != 'true'
      shell: bash
      working-directory: target
      run: |
        git push --force-with-lease origin "${SYNC_BRANCH}"

    - name: Resolve commit authors
      if: steps.range.outputs.has_changes == 'true'
      shell: bash
      working-directory: target
      env:
        UPSTREAM_READ_TOKEN: ${{ inputs.upstream-read-token }}
      run: |
        # Look up each upstream commit's author login via the GitHub API,
        # so the PR body can render `by [@user](https://github.com/user)`
        # even when the commit author email is a personal address (not the
        # `<id>+<login>@users.noreply.github.com` form). Without this, awk's
        # email-parsing fallback only captures noreply commits.
        #
        # Token: caller passes the bot repo's GITHUB_TOKEN. Public-repo
        # `/repos/{owner}/{repo}/commits/{sha}` works fine with it. For a
        # private upstream, supply an installation token for that repo.
        #
        # Capped at 50 lookups to mirror the PR body's commit-list cap.
        # Failures (rate limit, 404, no auth) downgrade silently — awk
        # falls back to the noreply parse, then to the plain author name.

        AUTHORS_FILE=/tmp/authors.tsv
        : > "$AUTHORS_FILE"

        if [ -z "${UPSTREAM_READ_TOKEN}" ]; then
          echo "No upstream-read-token provided; skipping author resolution. PR body will use email-derived logins only."
          exit 0
        fi

        BASE='${{ steps.base.outputs.base_sha }}'
        HEAD='${{ steps.range.outputs.head_sha }}'

        SHAS=$(git log --no-merges --pretty=format:"%H" "${BASE}..${HEAD}" | head -50)
        RESOLVED=0
        FAILED=0
        for SHA in ${SHAS}; do
          LOGIN=$(GH_TOKEN="${UPSTREAM_READ_TOKEN}" \
            gh api "/repos/${UPSTREAM_REPO}/commits/${SHA}" \
              --jq '.author.login // ""' 2>/dev/null || true)
          if [ -n "${LOGIN}" ]; then
            RESOLVED=$((RESOLVED + 1))
          else
            FAILED=$((FAILED + 1))
          fi
          printf '%s\t%s\n' "${SHA}" "${LOGIN}" >> "$AUTHORS_FILE"
        done

        echo "Resolved ${RESOLVED} author login(s); ${FAILED} fell back to email/name parsing."

    - name: Build PR body
      if: steps.range.outputs.has_changes == 'true'
      shell: bash
      working-directory: target
      env:
        TARGET_OWNER: ${{ inputs.target-owner }}
        TARGET_REPO: ${{ inputs.target-repo }}
        BOT_REPOSITORY: ${{ github.repository }}
        BOT_SERVER_URL: ${{ github.server_url }}
        RUN_ID: ${{ github.run_id }}
      run: |
        BASE='${{ steps.base.outputs.base_sha }}'
        BASE_SHORT='${{ steps.base.outputs.base_short }}'
        MODE='${{ steps.base.outputs.mode }}'
        HEAD='${{ steps.range.outputs.head_sha }}'
        HEAD_SHORT='${{ steps.range.outputs.head_short }}'
        COUNT='${{ steps.range.outputs.commit_count }}'
        DEFAULT_BRANCH='${{ steps.range.outputs.default_branch }}'
        HAS_CONFLICTS='${{ steps.prepare.outputs.has_conflicts }}'
        NOW="$(date -u '+%Y-%m-%d %H:%M UTC')"
        RUN_URL="${BOT_SERVER_URL}/${BOT_REPOSITORY}/actions/runs/${RUN_ID}"
        COMPARE_URL="https://github.com/${UPSTREAM_REPO}/compare/${BASE_SHORT}...${HEAD_SHORT}"
        WORKFLOW_URL="${BOT_SERVER_URL}/${BOT_REPOSITORY}/blob/HEAD/.github/workflows/sync-fanout.yml"

        TOTAL_COMMITS="$(git rev-list --count --no-merges "${BASE}..${HEAD}")"
        TOTAL_FILES="$(git diff --name-only "${BASE}..${HEAD}" -- . ':(exclude).github/workflows/**' | wc -l | tr -d ' ')"

        if [ "${MODE}" = "merge" ]; then
          BASE_NOTE="via shared git history (\`git merge-base\`)"
        else
          BASE_NOTE="auto-detected via tree match"
        fi

        if [ "${MODE}" = "merge" ]; then
          MODE_NOTE="This repository has shared git history with the upstream (fork or clean clone), so the changes are applied as a regular **merge commit** — upstream commit history and authorship are preserved."
        else
          MODE_NOTE="This repository has no shared git history with the upstream (e.g., created via Cloudflare's *Deploy to Cloudflare* button, which produces a single snapshot commit). The sync branch is rebuilt on top of upstream history, then downstream customizations are reapplied as one commit. After this PR is merged, future syncs can use regular merge mode."
        fi

        case "${SYNC_TARGET_KIND}" in
          branch)
            TARGET_NOTE="the latest commit on \`${UPSTREAM_BRANCH}\`"
            TARGET_ROW="\`${UPSTREAM_BRANCH}\` branch"
            ;;
          latestTag)
            TARGET_NOTE="the latest stable SemVer tag \`${SYNC_TARGET_TAG}\`"
            TARGET_ROW="latest stable SemVer tag \`${SYNC_TARGET_TAG}\`"
            ;;
          latestMajorTag)
            TARGET_NOTE="the latest stable SemVer tag in major \`${SYNC_TARGET_MAJOR}\`: \`${SYNC_TARGET_TAG}\`"
            TARGET_ROW="latest stable SemVer tag in major \`${SYNC_TARGET_MAJOR}\`: \`${SYNC_TARGET_TAG}\`"
            ;;
          *)
            TARGET_NOTE="\`${SYNC_TARGET_REF}\`"
            TARGET_ROW="\`${SYNC_TARGET_REF}\`"
            ;;
        esac

        {
          echo "This pull request is automatically maintained by the [\`${BOT_REPOSITORY}\`](${BOT_SERVER_URL}/${BOT_REPOSITORY}) sync bot (see [\`sync-fanout.yml\`](${WORKFLOW_URL})). It pulls ${TARGET_NOTE} from the upstream repository [\`${UPSTREAM_REPO}\`](https://github.com/${UPSTREAM_REPO}) into this repository so that your deployment stays in sync."
          echo ""
          echo "> ℹ️ ${MODE_NOTE}"
          echo ""

          if [ -s /tmp/manual-workflow-files.txt ]; then
            echo "## ⚠️ Workflow files require manual copy"
            echo ""
            echo "The upstream changed GitHub Actions workflow files. This bot intentionally does not request the \`workflows\` permission, so those files are excluded from the pushed sync branch. Review and copy these files manually from upstream if you want the workflow changes:"
            echo ""
            while IFS= read -r f; do
              [ -z "$f" ] && continue
              echo "- [\`${f}\`](https://github.com/${UPSTREAM_REPO}/blob/${HEAD}/${f})"
            done < /tmp/manual-workflow-files.txt
            echo ""
          fi

          if [ "${HAS_CONFLICTS}" = "true" ]; then
            echo "## ⚠️ Conflicts detected"
            echo ""
            echo "Some downstream customizations could not be reapplied automatically. The following files contain conflict markers and **must be resolved before merging**:"
            echo ""
            while IFS= read -r f; do
              [ -z "$f" ] && continue
              echo "- \`${f}\`"
            done < /tmp/conflict-files.txt
            echo ""
            echo "To resolve locally:"
            echo ""
            echo "\`\`\`bash"
            echo "git fetch origin ${SYNC_BRANCH}"
            echo "git checkout ${SYNC_BRANCH}"
            echo "# edit the files above and remove conflict markers"
            echo "git add -A && git commit --amend --no-edit"
            echo "git push --force-with-lease"
            echo "\`\`\`"
            echo ""
          fi

          echo "## Sync details"
          echo ""
          echo "| Field | Value |"
          echo "| --- | --- |"
          echo "| Upstream repository | [\`${UPSTREAM_REPO}\`](https://github.com/${UPSTREAM_REPO}) |"
          echo "| Upstream branch | \`${UPSTREAM_BRANCH}\` |"
          echo "| Sync target | ${TARGET_ROW} |"
          echo "| Sync mode | \`${MODE}\` (${BASE_NOTE}) |"
          echo "| Base (upstream commit at deploy/last sync) | [\`${BASE_SHORT}\`](https://github.com/${UPSTREAM_REPO}/commit/${BASE}) |"
          echo "| Target commit | [\`${HEAD_SHORT}\`](https://github.com/${UPSTREAM_REPO}/commit/${HEAD}) |"
          echo "| New commits | **${COUNT}** |"
          echo "| Files changed | **${TOTAL_FILES}** |"
          echo "| Last synced at | \`${NOW}\` |"
          echo "| Bot run | [#${RUN_ID}](${RUN_URL}) |"
          echo "| Compare on upstream | [\`${BASE_SHORT}…${HEAD_SHORT}\`](${COMPARE_URL}) |"
          echo ""
          echo "## Incoming commits"
          echo ""
          git log --no-merges --pretty=format:"%H%x09%s%x09%an%x09%ae" "${BASE}..${HEAD}" \
            | head -50 \
            | awk -F'\t' -v repo="${UPSTREAM_REPO}" -v authors_file="/tmp/authors.tsv" '
                BEGIN {
                  while ((getline line < authors_file) > 0) {
                    n = split(line, parts, "\t")
                    if (n >= 1) logins[parts[1]] = (n >= 2 ? parts[2] : "")
                  }
                  close(authors_file)
                }
                {
                  sha = $1; msg = $2; author_name = $3; email = $4
                  gsub(/\[/, "\\[", msg)
                  gsub(/\]/, "\\]", msg)
                  user = logins[sha]
                  if (length(user) == 0 && email ~ /@users\.noreply\.github\.com$/) {
                    user_part = email
                    sub(/@users\.noreply\.github\.com$/, "", user_part)
                    sub(/^[0-9]+\+/, "", user_part)
                    if (length(user_part) > 0) user = user_part
                  }
                  if (length(user) > 0 && user !~ /(\[|\])/) {
                    printf "- [%s](https://github.com/%s/commit/%s) by [@%s](https://github.com/%s)\n", msg, repo, sha, user, user
                  } else {
                    printf "- [%s](https://github.com/%s/commit/%s) by %s\n", msg, repo, sha, author_name
                  }
                }
              '
          echo ""
          if [ "${TOTAL_COMMITS}" -gt 50 ]; then
            echo ""
            echo "_…and $((TOTAL_COMMITS - 50)) more commits. See the [compare view](${COMPARE_URL}) for the full list._"
          fi
          echo ""
          echo "## Files changed"
          echo ""
          git diff --name-status "${BASE}..${HEAD}" -- . ':(exclude).github/workflows/**' | head -30 | awk -v repo="${UPSTREAM_REPO}" '{
            status = $1;
            path = $2;
            label = "changed";
            if (status == "A") label = "added";
            else if (status == "M") label = "modified";
            else if (status == "D") label = "deleted";
            else if (substr(status, 1, 1) == "R") { label = "renamed"; path = $2 " → " $3 }
            else if (substr(status, 1, 1) == "C") { label = "copied"; path = $2 " → " $3 }
            printf "- `%s` — %s\n", path, label;
          }'
          if [ "${TOTAL_FILES}" -gt 30 ]; then
            echo ""
            echo "_…and $((TOTAL_FILES - 30)) more files. See the [compare view](${COMPARE_URL}) for the full diff._"
          fi
          echo ""
          if [ -s /tmp/review-checklist.md ]; then
            echo "## Review checklist before merging"
            echo ""
            cat /tmp/review-checklist.md
            echo ""
          fi
          echo "## How to handle this PR"
          echo ""
          echo "| Action | What to do |"
          echo "| --- | --- |"
          echo "| Accept the update | Review the diff and click **Merge**. The next \`npm run deploy\` will apply the changes. |"
          echo "| Skip this round | Close this PR. If the upstream gets further commits later, the bot will reopen and force-refresh it. |"
          echo "| Disable sync entirely | Uninstall the GitHub App from this repository under *Settings → Integrations → Applications*. |"
          echo "| Resolve conflicts locally | \`git fetch origin ${SYNC_BRANCH} && git checkout ${SYNC_BRANCH} && git rebase ${DEFAULT_BRANCH} && git push --force-with-lease\` |"
          echo ""
          echo "> ⚠️ The \`${SYNC_BRANCH}\` branch is force-updated on every sync run (\`push --force-with-lease\`). Do not commit directly to it — your changes will be overwritten on the next sync."
        } > /tmp/pr_body.md

        echo "Wrote $(wc -l < /tmp/pr_body.md) lines to /tmp/pr_body.md."

    - name: Create or update PR
      if: steps.range.outputs.has_changes == 'true'
      shell: bash
      working-directory: target
      env:
        GH_TOKEN: ${{ inputs.target-token }}
        TARGET_OWNER: ${{ inputs.target-owner }}
        TARGET_REPO: ${{ inputs.target-repo }}
      run: |
        DEFAULT_BRANCH='${{ steps.range.outputs.default_branch }}'

        # Scope `gh` to the target repo explicitly. By default `gh` infers
        # from `origin`, which we set during clone, but being explicit is
        # cheaper than debugging a stray "could not find repo" later.
        REPO_FLAG="--repo ${TARGET_OWNER}/${TARGET_REPO}"

        # Only reuse an open PR. Closed or merged sync PRs may not be
        # reopenable after the branch is force-updated, so the next sync
        # should create a fresh PR instead of failing on `gh pr reopen`.
        # shellcheck disable=SC2086
        PR_DATA="$(gh pr list $REPO_FLAG --head "${SYNC_BRANCH}" --state open --json number,state)"
        PR_NUMBER="$(echo "${PR_DATA}" | jq -r '.[0].number // ""')"

        if [ -z "${PR_NUMBER}" ]; then
          # shellcheck disable=SC2086
          gh pr create $REPO_FLAG \
            --head "${SYNC_BRANCH}" \
            --base "${DEFAULT_BRANCH}" \
            --title "${PR_TITLE}" \
            --body-file /tmp/pr_body.md
          echo "Created new sync PR in ${TARGET_OWNER}/${TARGET_REPO}."
        else
          # shellcheck disable=SC2086
          gh pr edit $REPO_FLAG "${PR_NUMBER}" \
            --title "${PR_TITLE}" \
            --body-file /tmp/pr_body.md
          echo "Updated PR #${PR_NUMBER} in ${TARGET_OWNER}/${TARGET_REPO}."
        fi

